name: Build and Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy-to-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy backend files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "Dockerfile,requirements.txt,main.py,config.py,db.py,migrations.py,auth/**,forms/**,models/**,routers/**,schemas/**,services/**,uploads/**"
          target: "/app/fore-form"
          strip_components: 0

      - name: Build and Run on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "🚀 Starting Deployment on Linode VPS..."
            cd /app/fore-form

            # Ensure .env file exists so Docker run doesn't fail
            touch .env

            # 1. Build the Docker image locally on the VPS (bypasses Docker Hub!)
            echo "📦 Building Docker image..."
            docker build -t foreform-backend:latest .

            # 2. Run the Docker container (bound to localhost only — Nginx will proxy)
            echo "🔄 Restarting container..."
            docker stop foreform-backend || true
            docker rm foreform-backend || true

            docker run -d \
              --name foreform-backend \
              --restart always \
              -p 127.0.0.1:8000:8000 \
              -v /app/fore-form/uploads:/app/uploads \
              -v /app/fore-form/.env:/app/.env:ro \
              --env-file .env \
              foreform-backend:latest

            # 3. Clean up unused images to save disk space
            docker image prune -f
            echo "✅ Container deployed!"

      - name: Configure Nginx reverse proxy for api.pitbox.fun
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "🌐 Setting up Nginx reverse proxy..."

            # Install nginx + ssl-cert if not present
            if ! command -v nginx &> /dev/null; then
              apt-get update && apt-get install -y nginx ssl-cert
            fi

            # ── Only write config if SSL is not already configured ──
            # This prevents overwriting the working SSL config on every deploy
            if ! grep -q "listen 443 ssl" /etc/nginx/sites-available/api.pitbox.fun 2>/dev/null; then
              echo "📝 Writing Nginx config with SSL..."
              cat > /etc/nginx/sites-available/api.pitbox.fun << 'NGINX_CONF'
            server {
                listen 80;
                listen 443 ssl;
                server_name api.pitbox.fun;

                ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
                ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

                location / {
                    set $cors_origin "";
                    if ($http_origin ~* "^(https://(form\.pitbox\.fun|fore-form\.vercel\.app|pitbox\.fun)|http://(localhost|127\.0\.0\.1):(5173|3000))$") {
                        set $cors_origin $http_origin;
                    }

                    if ($request_method = 'OPTIONS') {
                        add_header 'Access-Control-Allow-Origin' $cors_origin always;
                        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;
                        add_header 'Access-Control-Allow-Credentials' 'true' always;
                        add_header 'Access-Control-Max-Age' 86400;
                        add_header 'Content-Length' 0;
                        add_header 'Content-Type' 'text/plain';
                        return 204;
                    }

                    add_header 'Access-Control-Allow-Origin' $cors_origin always;
                    add_header 'Access-Control-Allow-Credentials' 'true' always;
                    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;

                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto https;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                }
            }
            NGINX_CONF
              echo "✅ Nginx config written"
            else
              echo "✅ Nginx SSL config already exists — skipping overwrite"
            fi

            # Keep existing SSL configs, but make sure local dev origins can call the VPS API.
            sed -i 's#\^https://(form\\.pitbox\\.fun|fore-form\\.vercel\\.app|pitbox\\.fun)\$#^(https://(form\\.pitbox\\.fun|fore-form\\.vercel\\.app|pitbox\\.fun)|http://(localhost|127\\.0\\.0\\.1):(5173|3000))$#g' /etc/nginx/sites-available/api.pitbox.fun

            # Enable the site (idempotent)
            ln -sf /etc/nginx/sites-available/api.pitbox.fun /etc/nginx/sites-enabled/

            # Remove default site if it exists (avoids conflicts)
            rm -f /etc/nginx/sites-enabled/default

            # Always reload to pick up container restart
            nginx -t && systemctl reload nginx
            echo "✅ Nginx configured for api.pitbox.fun"

            # ── Firewall ──────────────────────────────────────────
            echo "🔒 Configuring firewall..."
            ufw allow 22/tcp
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw deny 8000
            ufw --force enable
            echo "✅ Firewall configured!"
