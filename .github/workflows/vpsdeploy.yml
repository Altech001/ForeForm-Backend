name: Build and Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy-to-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy backend files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          # Use the public IP address of your Linode VPS (e.g. 172.104.x.y)
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          # Copy only the necessary code files and directories (excludes local database, .git, .env, and uploads)
          source: "Dockerfile,requirements.txt,main.py,config.py,db.py,migrations.py,auth/**,forms/**,models/**,routers/**,schemas/**,services/**"
          target: "/app/fore-form"
          strip_components: 0

      - name: Build and Run on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # ─────────────────────────────────────────────────────────────────────────────
            # NOTE ON LINODE LISH:
            # Lish (Linode Shell) is an out-of-band serial console for emergency troubleshooting.
            # Do NOT use the Lish connection details (lish-us-southeast.linode.com) for automation.
            # Instead, use the direct Public IPv4 of your VPS as secrets.VPS_IP (port 22).
            # ─────────────────────────────────────────────────────────────────────────────

            echo "🚀 Starting Deployment on Linode VPS..."
            cd /app/fore-form

            # Ensure .env file exists so Docker run doesn't fail
            touch .env

            # 1. Build the Docker image locally on the VPS (bypasses Docker Hub!)
            echo "📦 Building Docker image..."
            docker build -t foreform-backend:latest .

            # 2. Run the Docker container
            echo "🔄 Restarting container..."
            docker stop foreform-backend || true
            docker rm foreform-backend || true


            docker run -d \
              --name foreform-backend \
              --restart always \
              -p 8000:8000 \
              -v /app/fore-form/uploads:/app/uploads \
              --env-file .env \
              foreform-backend:latest

            # 3. Clean up unused images to save disk space
            docker image prune -f
            echo "✅ Deployment complete!"